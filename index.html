<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jornada do Articulador — RBAC</title>
<style>
  /* Importando as fontes oficiais Barlow conforme o Guia de Identidade */
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Paleta Oficial RBAC */
    --primary: #8cc740;        /* Verde RBAC */
    --primary-dark: #7ab335;
    --primary-light: #f4faeb;
    
    --accent: #f7bd26;         /* Amarelo RBAC */
    --accent-dark: #dfaa22;
    
    --turquoise: #00a9ab;      /* Turquesa */
    --orange: #f26522;         /* Laranja */
    --pink: #e91e63;           /* Rosa/Magenta */
    --blue: #1b75bb;           /* Azul */
    
    /* Neutros e Estrutura */
    --bg: #f9fbf8; 
    --card: #ffffff;
    --text: #1a1a1a;           /* Cinza Quase Preto */
    --text-light: #555555;
    --border: #e2e8f0;
    --border-brand: #c8e8a0;   /* Verde claro para bordas de inputs */
    
    --danger: #e91e63;
    --success: #8cc740;
    
    /* Sombras e Raios */
    --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
    --radius-lg: 16px;
    --radius-md: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Barlow', sans-serif;
    background-color: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, .brand-font {
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  /* ════════════════════════════════════════════════════════════
     LAYOUT
     ════════════════════════════════════════════════════════════ */

  header {
    background: var(--card);
    padding: 1rem 2.5rem;
    border-bottom: 4px solid var(--primary);
    box-shadow: var(--shadow);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-container {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .brand-logo {
    height: 50px; /* Altura otimizada para o logótipo */
    width: auto;
    display: block;
  }

  .brand-divider {
    width: 1px;
    height: 30px;
    background: var(--border);
    margin: 0 4px;
  }

  .container {
    max-width: 1100px;
    margin: 2rem auto;
    padding: 0 1.5rem;
  }

  /* ════════════════════════════════════════════════════════════
     COMPONENTES
     ════════════════════════════════════════════════════════════ */

  .card {
    background: var(--card);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 1.5rem;
    box-shadow: var(--shadow);
    transition: transform 0.2s ease;
  }

  .btn {
    font-family: 'Barlow Semi Condensed', sans-serif;
    font-weight: 700;
    padding: 0.75rem 1.5rem;
    border-radius: var(--radius-md);
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s ease;
    text-transform: uppercase;
    font-size: 0.9rem;
  }

  .btn:active {
    transform: translateY(2px);
  }

  .btn-primary {
    background-color: var(--primary);
    color: white;
    box-shadow: 0 4px 0 var(--primary-dark);
  }
  .btn-primary:hover {
    background-color: var(--primary-dark);
  }

  .btn-accent {
    background-color: var(--accent);
    color: var(--text);
    box-shadow: 0 4px 0 var(--accent-dark);
  }

  .input-group {
    margin-bottom: 1.2rem;
  }

  label {
    display: block;
    margin-bottom: 0.4rem;
    font-weight: 600;
    color: var(--text-light);
    font-size: 0.85rem;
  }

  input, select, textarea {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1.5px solid var(--border-brand);
    border-radius: var(--radius-md);
    font-family: 'Barlow', sans-serif;
    font-size: 1rem;
    transition: all 0.2s;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(140, 199, 64, 0.15);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
    margin-top: 2rem;
  }

  .articulador-card {
    border-top: 6px solid var(--primary);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .articulador-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
  }

  .badge {
    padding: 0.25rem 0.6rem;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 800;
    text-transform: uppercase;
    background: var(--primary-light);
    color: var(--primary-dark);
    border: 1px solid var(--border-brand);
  }

  .ferramentas-list {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px dashed var(--border);
  }

  .ferramenta-item {
    background: var(--bg);
    padding: 0.6rem 0.8rem;
    border-radius: var(--radius-sm);
    margin-bottom: 0.6rem;
    font-size: 0.9rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid transparent;
    transition: border-color 0.2s;
  }
  
  .ferramenta-item:hover {
    border-color: var(--border-brand);
  }

  /* Categorias com Cores RBAC */
  .cat-digital { border-left: 3px solid var(--blue); }
  .cat-desplugada { border-left: 3px solid var(--orange); }
  .cat-metodologia { border-left: 3px solid var(--turquoise); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(26, 40, 32, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(6px);
  }

  .modal-content {
    background: white;
    width: 95%;
    max-width: 480px;
    padding: 2.5rem;
    border-radius: var(--radius-lg);
    position: relative;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
  }

  .modal-stripe {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: var(--primary);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }

  /* API Status */
  #api-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    background: var(--bg);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
  .dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }

</style>
</head>
<body>

<header>
  <div class="logo-container">
    <!-- Logotipo Principal Integrado -->
    <img src="Copy of 02-RBAC-LogotipoPrincipal-UmaCor.png" alt="Logotipo RBAC" class="brand-logo" onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block'">
    
    <!-- Fallback caso a imagem não carregue -->
    <div id="logo-fallback" style="display:none; font-weight:800; color:var(--primary); font-size: 1.5rem;" class="brand-font">RBAC</div>
    
    <div class="brand-divider"></div>
    
    <div>
      <span style="display:block; font-size: 0.85rem; color: var(--text); font-weight: 800; font-family: 'Barlow Semi Condensed'; text-transform: uppercase; letter-spacing: 0.5px;">Jornada do</span>
      <span style="display:block; font-size: 0.7rem; color: var(--text-light); font-weight: 600; text-transform: uppercase;">Articulador de Rede</span>
    </div>
  </div>
  
  <div style="display: flex; align-items: center; gap: 1.5rem;">
    <div id="api-status">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Conectando</span>
    </div>
    <button class="btn btn-primary" onclick="openModal('modal-articulador')">
      <span>+</span> Novo Articulador
    </button>
  </div>
</header>

<div class="container" id="main-content">
  <div style="text-align: center; padding: 5rem 2rem;" id="loading">
    <p class="brand-font" style="color: var(--primary); font-size: 1.2rem;">Sincronizando com a Rede...</p>
  </div>

  <div id="articuladores-grid" class="grid"></div>
</div>

<!-- Modal Articulador -->
<div id="modal-articulador" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-stripe"></div>
    <h2 style="margin-bottom: 1.5rem; color: var(--primary);">Cadastrar Articulador</h2>
    <div class="input-group">
      <label>Nome do Articulador</label>
      <input type="text" id="art-nome" placeholder="Nome Completo">
    </div>
    <div class="input-group">
      <label>Núcleo Criativo / Cidade</label>
      <input type="text" id="art-nucleo" placeholder="Ex: Núcleo Criativo BH">
    </div>
    <div style="display: flex; gap: 1rem; margin-top: 2rem;">
      <button class="btn" style="flex:1; background: #f0f0f0;" onclick="closeModal('modal-articulador')">Cancelar</button>
      <button class="btn btn-primary" style="flex:2;" onclick="salvarArticulador()">Criar Cadastro</button>
    </div>
  </div>
</div>

<!-- Modal Ferramenta -->
<div id="modal-ferramenta" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-stripe" style="background: var(--turquoise);"></div>
    <h2 style="margin-bottom: 1.5rem; color: var(--turquoise);">Nova Experiência</h2>
    <input type="hidden" id="ferr-autor">
    <div class="input-group">
      <label>Ferramenta / Recurso</label>
      <input type="text" id="ferr-nome" placeholder="Ex: Micro:bit, Papelão, Design Thinking...">
    </div>
    <div class="input-group">
      <label>Categoria</label>
      <select id="ferr-cat">
        <option value="Digital">Digital</option>
        <option value="Desplugada">Desplugada / Maker</option>
        <option value="Metodologia">Metodologia / Prática</option>
      </select>
    </div>
    <div style="display: flex; gap: 1rem; margin-top: 2rem;">
      <button class="btn" style="flex:1; background: #f0f0f0;" onclick="closeModal('modal-ferramenta')">Voltar</button>
      <button class="btn btn-accent" style="flex:2;" onclick="salvarFerramenta()">Adicionar Item</button>
    </div>
  </div>
</div>

<script>
// Mock de API para demonstração
const api = {
  get: () => Promise.resolve([
    { id: 1, nome: "Juliana Silva", nucleo: "Núcleo Curitiba", ferramentas: [{id: 101, nome: "Arduino", categoria: "Digital"}] },
    { id: 2, nome: "Ricardo Oliveira", nucleo: "Núcleo Manaus", ferramentas: [{id: 102, nome: "Stop Motion", categoria: "Digital"}, {id: 103, nome: "Sucata Criativa", categoria: "Desplugada"}] }
  ])
};

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function setApiStatus(online) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = online ? 'dot online' : 'dot';
  txt.innerText = online ? 'Rede Ativa' : 'Offline';
}

function getCatClass(cat) {
  if (cat.includes('Digital')) return 'cat-digital';
  if (cat.includes('Desplugada')) return 'cat-desplugada';
  return 'cat-metodologia';
}

async function renderArticuladores() {
  const grid = document.getElementById('articuladores-grid');
  document.getElementById('loading').style.display = 'none';
  
  const articuladores = await api.get();

  grid.innerHTML = articuladores.map(art => `
    <div class="card articulador-card">
      <div>
        <div class="articulador-header">
          <div>
            <h3 style="font-size: 1.1rem; color: var(--text);">${art.nome}</h3>
            <div style="display:flex; align-items:center; gap:5px; margin-top:4px">
               <span style="font-size: 0.75rem; color: var(--text-light);">${art.nucleo}</span>
            </div>
          </div>
          <span class="badge">Articulador</span>
        </div>
        
        <div class="ferramentas-list">
          <p style="font-size: 0.7rem; font-weight: 800; color: var(--text-light); margin-bottom: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;">Inventário de Práticas</p>
          ${art.ferramentas.length ? art.ferramentas.map(f => `
            <div class="ferramenta-item ${getCatClass(f.categoria)}">
              <span style="font-weight: 600;">${f.nome}</span>
              <span style="font-size: 0.7rem; color: var(--text-light); font-weight: 700; text-transform: uppercase;">${f.categoria.split(' ')[0]}</span>
            </div>
          `).join('') : '<p style="font-size:0.8rem; color:var(--text-light); font-style:italic;">Comece a adicionar ferramentas!</p>'}
        </div>
      </div>
      
      <button class="btn btn-accent" style="width: 100%; margin-top: 2rem; justify-content: center;" onclick="prepararFerramenta(${art.id})">
        + Adicionar Item
      </button>
    </div>
  `).join('');
}

function prepararFerramenta(id) {
  document.getElementById('ferr-autor').value = id;
  openModal('modal-ferramenta');
}

window.onload = () => {
  setApiStatus(true);
  renderArticuladores();
};
</script>

</body>
</html>
